name: Security (Snyk SCA + SAST)

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  #security-events: write   # needed if you upload SARIF to Code Scanning

jobs:
  snyk-backend:
    name: Snyk - Backend (Maven) SCA + SAST
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      # SCA: dependency scan
      - name: Snyk Open Source (SCA) - Maven
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test 
        # --severity-threshold=high

      # SAST: code scan
      - name: Snyk Code (SAST) - Backend
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk code test --severity-threshold=high

  snyk-frontend:
    name: Snyk - Frontend (Node) SCA + SAST
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      - name: Snyk Open Source (SCA) - npm
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test 
        #--severity-threshold=high

      - name: Snyk Code (SAST) - Frontend
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk code test --severity-threshold=high
